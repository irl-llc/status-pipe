<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- status-pipe wireframe: annotated card anatomy -->
  <rect width="760" height="470" fill="#1e1e1e"/>
  <text x="20" y="28" fill="#e0e0e0" font-size="13" font-weight="700">Card anatomy (tray density)</text>

  <!-- ===== the card ===== -->
  <g>
    <rect x="40" y="50" width="360" height="296" rx="4" fill="#2d2d30" stroke="#3c3c3c"/>
    <rect x="40" y="50" width="3" height="296" rx="1.5" fill="#cca700"/>
    <!-- header -->
    <rect x="52" y="60" width="48" height="14" rx="7" fill="#1f3a5f"/>
    <text x="76" y="70" fill="#9cc3ee" font-size="8" text-anchor="middle">fleet-api</text>
    <text x="106" y="71" fill="#3794ff" font-size="10" font-weight="600">#155</text>
    <text x="136" y="71" fill="#cccccc" font-size="10" font-weight="600">Rate limiter</text>
    <rect x="300" y="60" width="48" height="14" rx="7" fill="#3c3c3c"/>
    <text x="324" y="70" fill="#aaaaaa" font-size="8" text-anchor="middle">review</text>
    <text x="392" y="70" fill="#6e6e6e" font-size="8" text-anchor="end">14h</text>
    <!-- headline -->
    <text x="54" y="90" fill="#9a9a9a" font-size="9">T1a+T1b implemented and green; stack ready for first</text>
    <text x="54" y="102" fill="#9a9a9a" font-size="9">review pass starting at #512.</text>
    <!-- waiting banner -->
    <rect x="52" y="110" width="336" height="18" rx="3" fill="#3a3320"/>
    <text x="58" y="122" fill="#cca700" font-size="9">👀 review · PR #512 awaits your review · waiting 14h</text>
    <!-- blockers -->
    <text x="54" y="142" fill="#f48771" font-size="9">⛔ blocker text renders here verbatim, never truncated</text>
    <!-- PR row 1 -->
    <text x="62" y="160" fill="#6e6e6e" font-size="8">↑ main</text>
    <rect x="52" y="164" width="336" height="20" rx="3" fill="#252526"/>
    <text x="58" y="178" fill="#3794ff" font-size="9" font-weight="600">#512</text>
    <rect x="84" y="168" width="24" height="12" rx="6" fill="#1f3a5f"/>
    <text x="96" y="177" fill="#9cc3ee" font-size="7" text-anchor="middle">T1a</text>
    <text x="114" y="178" fill="#8a8a8a" font-size="8">rate-limit-core</text>
    <text x="218" y="178" fill="#89d185" font-size="9">✓ CI</text>
    <text x="246" y="178" fill="#aaaaaa" font-size="8">💬 5 · 2/3</text>
    <text x="302" y="178" fill="#aaaaaa" font-size="8">☑ 1/4</text>
    <text x="340" y="178" fill="#3794ff" font-size="8">→ #91</text>
    <text x="62" y="196" fill="#6e6e6e" font-size="8">↓ T1b #513, T2 #530</text>
    <!-- action row -->
    <rect x="52" y="206" width="128" height="18" rx="3" fill="#3c3c3c"/>
    <text x="116" y="218" fill="#cccccc" font-size="9" text-anchor="middle">✋ Ready for another look</text>
    <!-- ack note popover -->
    <rect x="52" y="232" width="336" height="58" rx="4" fill="#252526" stroke="#0e639c"/>
    <text x="60" y="248" fill="#8a8a8a" font-size="8">optional note to the agent:</text>
    <rect x="60" y="254" width="248" height="18" rx="3" fill="#3c3c3c"/>
    <text x="66" y="266" fill="#cccccc" font-size="8">Replied to all 4 threads; see #512 discussion</text>
    <rect x="316" y="254" width="62" height="18" rx="3" fill="#0e639c"/>
    <text x="347" y="266" fill="#ffffff" font-size="8" text-anchor="middle">Send ✋</text>
    <text x="60" y="284" fill="#6e6e6e" font-size="7">writes .autopilot/inbox/issue-155/ack-9b21d4ee.json (atomic, idempotent)</text>
    <!-- ack chip (post-send state) -->
    <rect x="52" y="300" width="172" height="16" rx="8" fill="#1f3a2a"/>
    <text x="138" y="311" fill="#89d185" font-size="8" text-anchor="middle">✓ sent 14:02 · awaiting pickup · withdraw</text>
    <text x="54" y="336" fill="#6e6e6e" font-size="8" font-style="italic">card body click → expands (tray: accordion · editor: right pane)</text>
  </g>

  <!-- ===== callouts ===== -->
  <g stroke="#6e6e6e" stroke-width="1" fill="none">
    <line x1="43" y1="56" x2="430" y2="56"/>
    <line x1="404" y1="67" x2="430" y2="67"/>
    <line x1="392" y1="96" x2="430" y2="96"/>
    <line x1="392" y1="119" x2="430" y2="119"/>
    <line x1="392" y1="139" x2="430" y2="139"/>
    <line x1="392" y1="158" x2="430" y2="158"/>
    <line x1="392" y1="174" x2="430" y2="174"/>
    <line x1="392" y1="193" x2="430" y2="193"/>
    <line x1="184" y1="215" x2="430" y2="215"/>
    <line x1="392" y1="261" x2="430" y2="261"/>
    <line x1="228" y1="308" x2="430" y2="308"/>
  </g>
  <g fill="#9a9a9a" font-size="9">
    <text x="436" y="59">health accent: red blocked/error · amber waiting · blue running · green done</text>
    <text x="436" y="70">repo badge (per-repo color) · issue # → tracking issue · phase chip · relative age</text>
    <text x="436" y="99">headline — the agent's own sentence, verbatim; 2-line clamp + tooltip</text>
    <text x="436" y="122">waitingOn banner: kind icon + detail + live duration; click → waitingOn.ref</text>
    <text x="436" y="142">blockers[] verbatim (red); presence forces NEEDS YOU lane</text>
    <text x="436" y="161">upstream indicator (small/dim): base branch, or part+PR if base is tracked</text>
    <text x="436" y="172">PR row: number → forge · part chip · head branch · CI aggregate ·</text>
    <text x="436" y="183">comments total · unresolved/resolvable · ☑ tasks (Bitbucket) · linked issues</text>
    <text x="436" y="196">downstream indicator: every tracked PR whose base = this head</text>
    <text x="436" y="218">single contextual primary action per card state</text>
    <text x="436" y="264">ack note popover (opens on click; note optional)</text>
    <text x="436" y="311">ack chip states: pending → picked up → superseded / stale (re-badges)</text>
  </g>

  <!-- ===== badge legend ===== -->
  <text x="40" y="386" fill="#e0e0e0" font-size="11" font-weight="700">CI badge</text>
  <g font-size="9">
    <text x="40" y="406" fill="#89d185">✓ passing</text>
    <text x="110" y="406" fill="#f48771">✗ failing (click → failing check URL)</text>
    <text x="310" y="406" fill="#cca700">● pending</text>
    <text x="380" y="406" fill="#6e6e6e">– none/unknown</text>
  </g>
  <text x="40" y="432" fill="#e0e0e0" font-size="11" font-weight="700">Comment caption rule</text>
  <text x="40" y="450" fill="#9a9a9a" font-size="9">"💬 5 · 2/3" = 5 total comments (incl. PR-level); 3 carry a resolved bit on this forge, 2 unresolved.</text>
  <text x="40" y="462" fill="#9a9a9a" font-size="9">Forges without PR-level resolution are captioned honestly — counts never imply resolvability that doesn't exist.</text>
</svg>
