<svg xmlns="http://www.w3.org/2000/svg" width="340" height="1000" viewBox="0 0 340 1000" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- status-pipe wireframe: side tray (compact triage index). Scenario = design/08-workflow-simulation.md, 08:30 -->
