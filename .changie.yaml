# Changie configuration — https://changie.dev
#
# Changelog fragments live as individual files under .changes/unreleased/.
# Each PR that changes user-facing behavior adds one fragment (see
# CONTRIBUTING.md). A scheduled job batches pending fragments into a release.
#
# Versioning policy: the extension is pre-1.0, so we stay on 0.x.
# Per semver-for-0.x, features AND breaking changes both bump the MINOR
# component (we never bump major while on 0.x); bug fixes bump the PATCH
# component. The kind ordering below is consumed by the auto-release
# workflow to derive the bump level: any "Added"/"Changed"/"Removed"/
# "Deprecated" pending change => minor; only "Fixed"/"Security" => patch.
changesDir: .changes
unreleasedDir: unreleased
headerPath: header.tpl.md
changelogPath: CHANGELOG.md
versionExt: md
versionFormat: '## [{{.Version}}](https://github.com/ed-irl/status-pipe/releases/tag/v{{.Version}}) - {{.Time.Format "2006-01-02"}}'
kindFormat: '### {{.Kind}}'
changeFormat: '- {{.Body}}'
kinds:
  - label: Added
    auto: minor
  - label: Changed
    auto: minor
  - label: Deprecated
    auto: minor
  - label: Removed
    auto: minor
  - label: Fixed
    auto: patch
  - label: Security
    auto: patch
newlines:
  afterChangelogHeader: 1
  beforeChangelogVersion: 1
  endOfVersion: 1
