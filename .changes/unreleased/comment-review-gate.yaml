kind: Added
body: 'Every forge comment now passes an **adversarial review gate** before posting. The worker spawns a reviewer subagent that vets the draft against four tests: no confabulation (claims backed by real, checkable evidence), brevity, human-shaped structure (meaningful formatting, ~3 concepts held at once and progressive reasoning rather than a dense wall), and no repetition/nagging (no re-posting earlier content; a terse "still waiting" ping only when meaningful discussion has happened since the last post). The gate always ends in a posted comment — if a draft can''t pass after a couple of rounds, the worker posts an honest account of where it is stuck rather than polished noise or silence. The reviewer is required: if the review tool is unavailable the worker escalates instead of posting unreviewed.'
