kind: Added
body: 'Every encoded indicator in the queue now names its meaning in a hover tooltip (UI rule 6 — "meaning is never JSON-only"): the card''s accent bar ("Blocked — needs you", "Stale worker — no heartbeat in 40m"), the header status glyph (crashed / degraded / done), the blocker glyph, the waiting-line glyph (the kind in words, not just the link behind it), and the launch-config state glyph. What a color or icon means no longer requires opening the ticket file. The tooltip is a DOM overlay rather than a native title, so it is both screen-reader-labelled and captured in the indicator-meaning snapshot baselines — the meaning is visibly verifiable on hover, not just asserted as text.'
