kind: Changed
body: 'The editor detail pane now reads top-to-bottom as a hierarchy, every block under a labeled header (design/05-ui.md): **Status** (one line — named health, phase, age, worker liveness), **What needs you** (blockers + the waiting line, with a long blocker clamped to one line and its full text on hover instead of dumped), **Context** (the headline, markdown-stripped, not a floating paragraph), and **Evidence** (PR table, sub-tickets, history, raw-JSON peek, file links). This replaces the old layout — a bare headline paragraph above unheadered red blocker lines — that read denser than the raw JSON it was meant to beat.'
