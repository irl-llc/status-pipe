kind: Changed
body: 'Workers now close a ticket when the work is genuinely done: orient detects the ticket''s PR merged (or the issue closed/abandoned) and writes the terminal state — `phase: "merged"`/`"abandoned"`, `health: "done"`, a closing lifecycle comment — then ensures the forge issue is closed and removes its own worktree as the pass''s final action, so completed work moves to QUIET and a finished checkout never lingers on the trunk. The transition is kept strictly terminal (`health: "done"` and the worktree self-remove only ever happen with a terminal `phase`, never at `awaiting-merge`) so the operator''s merge request is never hidden. This is the fast "belt"; the planner reclaims the worktree on a later tick if a worker can''t. Brings `/status-pipe:work-ticket` to parity with `/status-pipe:work-epic`, which already closed on a fully-merged checklist.'
