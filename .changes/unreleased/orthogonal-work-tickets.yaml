kind: Added
body: 'Workers now treat work outside the current ticket''s scope as **orthogonal work to file, not implement**: search for an existing issue, open a cross-referenced ticket if none exists, and keep going on the current ticket (only blocking when it genuinely cannot proceed). Self-generated design proposals must be approved by an operator through the ticketing system before any implementation — a worker may propose, but never goes whole-hog building a feature it invented. The capability-wall guidance was also corrected: snapshot regeneration is ordinary local Docker work, not a wall, and a transiently-down tool (e.g. a stopped Docker daemon) is an environment fault to report literally — never license to redesign the workflow around it.'
