kind: Changed
body: 'Workers now run as their own `claude` processes instead of subagents inside the orchestrator. The tick is a planner: it stamps work and writes a dispatch plan to `orchestrator.json`; the extension supervisor spawns one worker process per item from a new `mode:"worker"` `launch.json` template (resolving `%prompt%`/`%worktree%`). This gives each worker a full context lifecycle — project rules, skills, and its own subagents (e.g. the required comment-review gate) — which subagents could not have. Single-repo loops now plan only; the supervisor must be enabled to run workers.'
