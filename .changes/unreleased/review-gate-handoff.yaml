kind: Added
body: 'Workers now hand a ticket to NEEDS YOU only behind an explicit, head-anchored pre-handoff gate (`config.reviewGate`): when `requireCiGreen` (default true) the PR head''s checks must have actually run and the live aggregate be `passing`, and every bot in `waitForBots` (default empty, opt-in) must have a review on the current head SHA that the worker has read and addressed — a check or bot review on a stale commit no longer counts. A required bot still silent after `botWaitMaxMinutes` (~30) escalates a NEEDS-YOU blocker instead of stranding silently. Like `inventory.assignees`, `waitForBots` is routing, not trust — it only delays the handoff; bot comments stay untrusted data. The extension adds a deterministic CI backstop: a card the worker marked merge-ready is no longer rendered ready-to-merge while its live CI isn''t `passing` (failing surfaces as orphaned-CI, otherwise it falls to WAITING), so a worker that jumps the gate is visibly corrected regardless of what it wrote. A no-CI repo opts out with `requireCiGreen: false`.'
