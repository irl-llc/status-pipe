kind: Added
body: 'Deterministic planner core (`src/planner/`): a pure, vscode-free reconciliation pass — trust gate, inventory + trust/assignee filtering, epic tracking-ticket creation, ack consumption, staleness reconcile, fair-schedule dispatch, parked declaration, and the orchestrator wrap — behind injected ports (forge inventory, protocol read/write, git, clock). It is the testable replacement for the LLM `/status-pipe:tick`, shared by the extension (in-process, landing next) and the standalone CLI (#39). A suite of unit tests exercises it end-to-end through in-memory fakes.'
