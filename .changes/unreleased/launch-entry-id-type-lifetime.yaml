kind: Changed
body: '`launch.json` agent entries replace the single `mode` field with three orthogonal fields: `id` (role — reserved `tick` planner and `worker` template; any other id is a generic agent), `type` (`claude` supplies the default prompt/args, `exec` is an explicit command), and `lifetime` (`scheduled` or `daemon`). A `claude` worker is now just `id`/`type`/`cwd`/`env`. Existing untyped entries read as `exec`/`scheduled`; the planner is identified by `id:"tick"` and the worker template by `id:"worker"`. The trust hash now also covers `id`, `type`, and `lifetime`, so re-approval is required after upgrading.'
