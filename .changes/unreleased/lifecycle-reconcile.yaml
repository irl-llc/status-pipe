kind: Changed
body: 'The planner now reconciles each ticket against its forge issue every pass, so completed and re-opened work no longer needs a worker to be running. A ticket whose issue has closed is moved to a terminal state — `merged`, or `abandoned` when the issue was closed as not-planned — so it goes QUIET instead of sitting at "awaiting your merge" forever; this is what makes "merge then walk away" clean, since no worker runs after you merge. A terminal ticket whose issue the operator re-opened (the forge reports it reopened) is revived to `planning` and re-dispatched, resuming from its preserved plan/history rather than starting over. And worktrees that no longer back active work are reclaimed each pass. A forge hiccup never closes a live ticket: an issue-state lookup that fails simply closes nothing that pass.'
