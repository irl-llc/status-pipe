kind: Added
body: 'Filesystem ports for the in-process planner: protocol read/write (`protocolIo`), epic specs (`epicsIo`), and git worktrees (`gitWorktree`). This is where the extension becomes a protocol-file *writer* — ticket, orchestrator, and ack writes are atomic whole-file rewrites (temp + rename, matching the ack writer). Ticket writes MERGE the planner''s modeled fields onto the on-disk file, so stamping a worker never clobbers agent-owned working memory (`plan`/`deadEnds`/`notes`/`stalledPasses`). Epic specs round-trip their `> **Tracking ticket:**` header; worktrees land under `.claude/worktrees/<slug>` on a per-slug branch, idempotent across passes. Exercised against real temp dirs and a real temp git repo.'
