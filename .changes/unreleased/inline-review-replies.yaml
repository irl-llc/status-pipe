kind: Added
body: 'Workers now answer PR reviews where they were made. `post-comment` gains `--reply-to <review-comment-id>` (with `--pr`) to thread a reply under an inline review comment via the forge''s review-reply endpoint instead of opening a new top-level comment, and `fetch-comments --pr <N>` tags each inline review comment with the `file:line` it annotates and the exact reply command. The `protocol` skill adds PR-response etiquette (§7b): reply in-thread, process every review/bot comment, link the PR with a closing keyword so the merge closes the issue, and never decline or resolve a comment you did not address without operator agreement.'
