kind: Changed
body: 'The default `tick` planner now runs **in-process** (`type:"built-in"`) instead of spawning `claude -p /status-pipe:tick` every interval. The ~95%-deterministic reconciliation — trust filter, forge inventory, ack consumption, staleness reconcile, fair-schedule, worktree + ticket stamping, `orchestrator.json` — is plain TypeScript, skipping a cold-start LLM boot each pass and gaining real test coverage. It reuses the supervised-runner machinery (renamed `AgentRunner` → `SupervisedRunner`): a built-in entry presents as a one-shot process, so lifetime/parking/backoff are unchanged, and dispatch still flows through `orchestrator.json`. The external `claude` tick remains available as `type:"claude"`. NOTE: this changes the default launch entry, so its trust hash changes — the operator must re-approve the `tick` entry in the extension before the planner runs. Requires a connected forge with issue inventory (GitHub); a Jira/Bitbucket inventory is a follow-up. On a forge that has no issue inventory the built-in tick fails loudly (pointing you to `type:"claude"`) rather than silently no-opping forever; before a forge connects it simply skips and retries.'
