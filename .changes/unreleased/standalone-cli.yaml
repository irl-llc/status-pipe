kind: Added
body: 'A standalone `status-pipe` CLI runs the planner (reconcile → dispatch → report) with no VS Code extension — for CI, cron, and headless servers. It is a second consumer of the same `src/planner/` core the extension uses in-process (no logic fork), with its own protocol-dir/config discovery, GitHub auth (GITHUB_TOKEN/GH_TOKEN → `gh auth token` → git credential helper; never from committed config) and terminal exit codes (0 ok · 1 runtime error or trust refusal · 2 usage). With no process supervisor, it derives live workers from on-disk ticket heartbeats so it never double-dispatches a running ticket. Shipped as a self-contained single-file executable (Node SEA, no preinstalled Node) built and smoke-tested per OS/arch (linux/macOS/windows × x64/arm64) and attached to each Release; `npm i -g status-pipe` is a secondary install. GHES/enterprise-Actions hosts work via GITHUB_SERVER_URL/GITHUB_API_URL (Actions-native) or explicit GITHUB_BASE_URL.'
