kind: Added
body: 'New `/status-pipe:git-spice-worker` command + `git-spice-integration` skill — an integration-branch-aware worker variant for repos that maintain a git-spice integration branch. It wraps the dispatched `/status-pipe:work-ticket`/`work-epic` worker, keeping a stack''s integration tip disconnected while the feature is unstable and — only when the feature is complete — re-registering the tip and rebuilding the integration branch inside the finishing worker''s own worktree (git''s one-worktree-per-branch rule is the lock; finishing workers contend with truncated exponential backoff + jitter). A repo opts in by pointing its launch.json worker entry at `/status-pipe:git-spice-worker %prompt%`.'
