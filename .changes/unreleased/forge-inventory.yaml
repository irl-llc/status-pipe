kind: Added
body: 'Forge issue inventory (`ForgeInventory`): the net-new forge surface the in-process planner reconciles against — repo visibility for the trust gate, labeled-issue discovery, exact-title find, and create-issue (the one mutation, for epic tracking tickets). Implemented for GitHub over GraphQL reads + a REST create; Bitbucket returns none (its tracking tickets live in a separately-configured Jira, a documented follow-up). A thin adapter maps it onto the planner''s `InventoryPort`, so the pure planner core never imports forge. Exercised end-to-end against the in-process fake forge server.'
