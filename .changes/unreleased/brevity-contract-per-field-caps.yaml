kind: Changed
body: 'The worker prompts now spell out the brevity contract per operator-facing field instead of as a general principle: `headline` is one clause on one line, each `blockers[]` entry is one terse imperative, `waitingOn.detail` is one short phrase, and each `history[].note` is the shortest line that conveys the action. A new "action, not justification" rule sends the *why* (context, what was tried) to `history`/`plan`/`notes`, and a worked terse blocked-ticket example plus a pre-write self-check ("say it aloud, then the shortest version") target the defensive wall-of-prose failure mode workers fell into when blocked.'
